<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f3d22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wedge-In">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon.svg">
<title>Wedge-In Visual Golf Coach</title>
<style>
:root{--green:#0f3d22;--cream:#f4f1e8;--card:#fffdf7;--line:#ded7c7;--ink:#172015;--bad:#8a1f17}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
header{position:sticky;top:0;background:var(--green);color:white;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;z-index:10}
h1{font-size:20px;margin:0}.sub{font-size:12px;opacity:.85}main{max-width:880px;margin:auto;padding:14px 14px 96px}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0}button{width:100%;border:0;border-radius:13px;padding:11px;font-weight:850;font-size:14px}
.tab{background:#fffaf0;border:1px solid var(--line)}.tab.active{background:var(--green);color:white}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin:12px 0;box-shadow:0 8px 20px rgba(0,0,0,.06)}
label{display:block;font-size:12px;font-weight:850;margin:10px 0 5px;color:#394235;text-transform:uppercase;letter-spacing:.03em}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #c9c2b5;border-radius:12px;padding:11px;font-size:16px;background:white}textarea{min-height:72px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.primary{background:var(--green);color:white}.secondary{background:#e9e5da}.danger{background:var(--bad);color:white}.hidden{display:none}
.holeNav{display:grid;grid-template-columns:repeat(9,1fr);gap:6px}.holeBtn{background:white;border:1px solid var(--line);padding:8px}.done{background:#dcefd8}.cur{background:var(--green);color:white}
.coach{white-space:pre-wrap;background:#f9fbf6;border:1px dashed #b8c8b1;border-radius:14px;padding:12px;line-height:1.45}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi{background:white;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}.kpi b{display:block;font-size:22px}.kpi span{font-size:11px;color:#667}
svg{width:100%;height:auto;display:block;border-radius:16px;border:1px solid var(--line);background:#dff1d8}.legend{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;font-size:12px;color:#667}.pill{background:#eef4ee;border:1px solid #d8e6d5;border-radius:999px;padding:6px 8px;text-align:center;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #eee;padding:7px 4px;text-align:left;vertical-align:top}th{font-size:11px;color:#667}
.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,247,.97);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:20}.footer div{max-width:880px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:620px){.row,.row3{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.tabs{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header><h1>Wedge-In Golf Coach</h1><div class="sub">Visual yardage-book planner + performance log</div></header>
<main>
<div class="tabs"><button class="tab active" onclick="showTab('setup')">Setup</button><button class="tab" onclick="showTab('course')">Visuals</button><button class="tab" onclick="showTab('hole')">Hole</button><button class="tab" onclick="showTab('coach')">Coach</button><button class="tab" onclick="showTab('export')">Export</button></div>
<section id="setup" class="screen"><div class="card"><h2>Round Setup</h2><div class="row"><div><label>Course</label><input id="courseName" placeholder="Shadowridge, The Crossings"></div><div><label>Date</label><input id="date" type="date"></div></div><div class="row3"><div><label>Tee</label><input id="tee" placeholder="White / Blue / Combo"></div><div><label>Rating</label><input id="rating" type="number" step="0.1"></div><div><label>Slope</label><input id="slope" type="number"></div></div><label>Round Goal</label><select id="goal"><option>Keep driver penalties under 3</option><option>Zero 3-putts</option><option>Club up into hurting wind</option><option>Conservative targets only</option><option>Track bad decisions honestly</option></select><button class="primary" onclick="saveSetup();showTab('course')">Save Setup</button></div></section>
<section id="course" class="screen hidden"><div class="card"><h2>Hole <span id="courseHoleNum">1</span> Visual Plan</h2><div class="holeNav" id="courseNav"></div><div id="visualBox"></div><div class="legend"><div class="pill">Green = ideal</div><div class="pill">Red = danger</div><div class="pill">Blue = water</div></div><div class="row3"><div><label>Par</label><select id="cPar"><option>3</option><option selected>4</option><option>5</option></select></div><div><label>Yardage</label><input id="cYards" type="number"></div><div><label>Handicap</label><input id="cHcp" type="number"></div></div><label>Hole Shape</label><select id="cShape" onchange="render()"><option>Straight</option><option>Dogleg Right</option><option>Dogleg Left</option><option>Par 3</option></select><label>Primary Danger</label><select id="cDangerSide" onchange="render()"><option>Right OB</option><option>Left OB</option><option>Water Right</option><option>Water Left</option><option>Bunker Short</option><option>Long Trouble</option><option>None</option></select><label>Safe Tee Club</label><input id="cSafeClub" placeholder="3HL, 3W, 3H, Driver"><label>Target / Landing Zone</label><textarea id="cTee" placeholder="Aim left-center. 3HL removes OB right."></textarea><label>Approach Plan</label><textarea id="cApproach" placeholder="Play middle/back number. Avoid long."></textarea><button class="primary" onclick="saveCourseHole(true)">Save Visual + Next</button></div></section>
<section id="hole" class="screen hidden"><div class="card"><h2>Hole <span id="holeNum">1</span></h2><div class="coach" id="holePlan"></div><div class="holeNav" id="holeNav"></div><div class="row3"><div><label>Par</label><select id="par"><option>3</option><option selected>4</option><option>5</option></select></div><div><label>Score</label><input id="score" type="number"></div><div><label>Putts</label><input id="putts" type="number"></div></div><div class="row"><div><label>Tee Club</label><input id="teeClub" placeholder="Driver, 3W, 3HL"></div><div><label>Tee Result</label><select id="teeResult"><option>Fairway</option><option>Left rough</option><option>Right rough</option><option>OB left</option><option>OB right</option><option>Penalty / hazard</option></select></div></div><div class="row3"><div><label>Approach Distance</label><input id="approachDist" type="number"></div><div><label>Club</label><input id="club" placeholder="PW, 7i, 5W"></div><div><label>GIR</label><select id="gir"><option>No</option><option>Yes</option></select></div></div><div class="row"><div><label>Main Miss</label><select id="miss"><option>None</option><option>Short</option><option>Long</option><option>Left</option><option>Right</option><option>Chunk</option><option>Thin</option><option>3-putt</option></select></div><div><label>Main Cause</label><select id="cause"><option>None</option><option>Wrong club</option><option>Bad target</option><option>Wind misread</option><option>Bad swing</option><option>Driver penalty</option><option>Mental error</option></select></div></div><label>Notes</label><textarea id="notes" placeholder="What happened and what should you do next time?"></textarea><button class="primary" onclick="saveHole(true)">Save Hole + Next</button><div class="row"><button class="secondary" onclick="prevHole()">Previous</button><button class="secondary" onclick="nextHole()">Next</button></div></div></section>
<section id="coach" class="screen hidden"><div class="card"><h2>Coach Analysis</h2><div class="kpis" id="kpis"></div><div class="coach" id="coachText"></div></div><div class="card"><h2>Round Table</h2><div id="table"></div></div></section>
<section id="export" class="screen hidden"><div class="card"><h2>Export / Reset</h2><button class="secondary" onclick="exportCSV()">Export CSV</button><button class="secondary" onclick="copySummary()">Copy Summary</button><button class="danger" onclick="resetRound()">Clear Round</button></div></section>
</main><div class="footer"><div><button class="secondary" onclick="saveHole(false)">Save</button><button class="primary" onclick="showTab('coach')">Analyze</button></div></div>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))}
let setup=JSON.parse(localStorage.getItem('wiSetup')||'{}'),course=JSON.parse(localStorage.getItem('wiCourse')||'{}'),holes=JSON.parse(localStorage.getItem('wiHoles')||'{}');let h=Number(localStorage.getItem('wiHole')||1),ch=Number(localStorage.getItem('wiCourseHole')||1);const $=id=>document.getElementById(id),today=()=>new Date().toISOString().slice(0,10);
function showTab(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));$(id).classList.remove('hidden');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('.tab')].find(b=>b.textContent.toLowerCase().includes(id==='course'?'visuals':id)).classList.add('active');render()}
function loadSetup(){['courseName','date','tee','rating','slope','goal'].forEach(id=>{if(setup[id])$(id).value=setup[id]});if(!$('date').value)$('date').value=today()}function saveSetup(){['courseName','date','tee','rating','slope','goal'].forEach(id=>setup[id]=$(id).value);localStorage.setItem('wiSetup',JSON.stringify(setup));render()}function navHTML(cur,obj,fn){return Array.from({length:18},(_,i)=>`<button class="holeBtn ${obj[i+1]?'done':''} ${cur===i+1?'cur':''}" onclick="${fn}(${i+1})">${i+1}</button>`).join('')}
function holeSVG(c){let shape=c.cShape||'Straight',danger=c.cDangerSide||'Right OB';let fw=shape==='Dogleg Right'?'M180,560 C210,430 310,390 360,310 C405,245 390,170 340,100':shape==='Dogleg Left'?'M320,560 C290,430 190,390 140,310 C95,245 110,170 160,100':shape==='Par 3'?'M250,555 C230,420 230,270 250,130':'M250,560 C250,430 250,280 250,110';let lx=shape==='Dogleg Right'?315:shape==='Dogleg Left'?185:250,ly=345;let d='';if(danger.includes('Right'))d+='<rect x="410" y="60" width="55" height="520" fill="#9b2a20" opacity=".85"/>';if(danger.includes('Left'))d+='<rect x="35" y="60" width="55" height="520" fill="#9b2a20" opacity=".85"/>';if(danger.includes('Water'))d+=danger.includes('Right')?'<ellipse cx="410" cy="310" rx="55" ry="155" fill="#3e9bd6" opacity=".9"/>':'<ellipse cx="90" cy="310" rx="55" ry="155" fill="#3e9bd6" opacity=".9"/>';if(danger==='Bunker Short')d+='<ellipse cx="205" cy="155" rx="38" ry="22" fill="#d8bc78"/><ellipse cx="295" cy="160" rx="38" ry="22" fill="#d8bc78"/>';if(danger==='Long Trouble')d+='<rect x="135" y="35" width="230" height="35" fill="#9b2a20" opacity=".85"/>';return `<svg viewBox="0 0 500 620"><rect width="500" height="620" fill="#dff1d8"/><path d="${fw}" stroke="#7fbf6a" stroke-width="130" stroke-linecap="round" fill="none"/><path d="${fw}" stroke="#4f9a45" stroke-width="76" stroke-linecap="round" fill="none" opacity=".9"/>${d}<ellipse cx="250" cy="92" rx="62" ry="42" fill="#79c45d"/><circle cx="250" cy="92" r="18" fill="#5eb84d"/><line x1="250" y1="92" x2="250" y2="46" stroke="#111" stroke-width="3"/><path d="M250 46 L285 57 L250 68 Z" fill="#f4f1e8" stroke="#111"/><ellipse cx="${lx}" cy="${ly}" rx="78" ry="44" fill="#e9f7e6" stroke="#0f3d22" stroke-width="4" stroke-dasharray="8 7"/><text x="${lx-52}" y="${ly+5}" font-size="18" font-weight="900" fill="#0f3d22">LAND HERE</text><rect x="205" y="548" width="90" height="28" rx="8" fill="#caa775"/><text x="218" y="568" font-size="14" font-weight="900" fill="#3b2a13">TEE BOX</text><text x="18" y="28" font-size="18" font-weight="900" fill="#0f3d22">Hole ${ch}: ${c.cYards||'—'} yds • Par ${c.cPar||'—'}</text><text x="18" y="604" font-size="15" fill="#0f3d22">Safe club: ${c.cSafeClub||'not set'} • Shape: ${shape}</text></svg>`}
function loadCourseHole(n){ch=n;localStorage.setItem('wiCourseHole',ch);$('courseHoleNum').textContent=ch;let x=course[ch]||{};['cPar','cYards','cHcp','cShape','cDangerSide','cSafeClub','cTee','cApproach'].forEach(id=>$(id).value=x[id]||(id==='cPar'?'4':id==='cShape'?'Straight':id==='cDangerSide'?'Right OB':''));render()}function saveCourseHole(advance){course[ch]={cPar:$('cPar').value,cYards:$('cYards').value,cHcp:$('cHcp').value,cShape:$('cShape').value,cDangerSide:$('cDangerSide').value,cSafeClub:$('cSafeClub').value,cTee:$('cTee').value,cApproach:$('cApproach').value};localStorage.setItem('wiCourse',JSON.stringify(course));if(advance&&ch<18)loadCourseHole(ch+1);render()}
function loadHole(n){h=n;localStorage.setItem('wiHole',h);$('holeNum').textContent=h;let x=holes[h]||{},c=course[h]||{};['par','score','putts','teeClub','teeResult','approachDist','club','gir','miss','cause','notes'].forEach(id=>$(id).value=x[id]||(id==='par'?(c.cPar||'4'):id==='teeClub'?(c.cSafeClub||''):id==='teeResult'?'Fairway':id==='gir'?'No':id==='miss'||id==='cause'?'None':''));render()}function saveHole(advance){holes[h]={};['par','score','putts','teeClub','teeResult','approachDist','club','gir','miss','cause','notes'].forEach(id=>holes[h][id]=$(id).value);localStorage.setItem('wiHoles',JSON.stringify(holes));if(advance&&h<18)loadHole(h+1);render()}function nextHole(){if(h<18)loadHole(h+1)}function prevHole(){if(h>1)loadHole(h-1)}
function metrics(){let a=Object.keys(holes).map(k=>({hole:+k,...holes[k]})).sort((a,b)=>a.hole-b.hole),score=a.reduce((s,x)=>s+(+x.score||0),0),par=a.reduce((s,x)=>s+(+x.par||0),0),putts=a.reduce((s,x)=>s+(+x.putts||0),0),pen=a.filter(x=>(x.teeResult||'').includes('OB')||(x.teeResult||'').includes('Penalty')).length,three=a.filter(x=>(+x.putts||0)>=3).length,gir=a.filter(x=>x.gir==='Yes').length;return{a,score,par,over:score-par,putts,pen,three,gir}}function summary(){let m=metrics();if(!m.a.length)return'No holes logged yet.';let issues=[];if(m.pen>=3)issues.push('Tee penalties are the first leak. Use the safe club from the visual plan.');if(m.three>=2)issues.push('3-putts are costing you. Lag speed is the assignment.');if(m.gir/m.a.length<.35)issues.push('GIR rate is low. Bigger targets and more club.');if(!issues.length)issues.push('No obvious disaster leak yet. Keep protecting against doubles.');return`${setup.courseName||'Round'}: ${m.score} (${m.over>=0?'+':''}${m.over}) through ${m.a.length} holes\nPutts: ${m.putts} | GIR: ${m.gir} | Penalties: ${m.pen} | 3-putts: ${m.three}\n\nCoach read:\n${issues.map((x,i)=>(i+1)+'. '+x).join('\n')}`}
function render(){$('courseNav').innerHTML=navHTML(ch,course,'loadCourseHole');$('holeNav').innerHTML=navHTML(h,holes,'loadHole');let c=course[ch]||{};$('visualBox').innerHTML=holeSVG(c);let hc=course[h]||{};$('holePlan').innerHTML=holeSVG(hc)+`\nHole plan: Par ${hc.cPar||'—'} | ${hc.cYards||'—'} yards | HCP ${hc.cHcp||'—'}\nSafe tee club: ${hc.cSafeClub||'—'}\nTarget: ${hc.cTee||'No tee strategy saved.'}\nApproach: ${hc.cApproach||'No approach strategy saved.'}\nDanger: ${hc.cDangerSide||'No danger saved.'}`;let m=metrics();$('kpis').innerHTML=[['Score',m.a.length?m.score:'—'],['Vs Par',m.a.length?(m.over>=0?'+'+m.over:m.over):'—'],['Putts',m.putts],['GIR',m.gir],['Penalties',m.pen],['3-putts',m.three]].map(x=>`<div class="kpi"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('');$('coachText').textContent=summary();$('table').innerHTML=m.a.length?`<table><tr><th>Hole</th><th>Score</th><th>Tee</th><th>Approach</th><th>Cause</th><th>Note</th></tr>${m.a.map(x=>`<tr><td>${x.hole}</td><td>${x.score||''}</td><td>${x.teeClub||''} ${x.teeResult||''}</td><td>${x.approachDist||''} ${x.club||''} GIR:${x.gir||''}</td><td>${x.cause||''}</td><td>${x.notes||''}</td></tr>`).join('')}</table>`:'No holes yet.'}
function exportCSV(){let m=metrics(),rows=['hole,par,yards,hcp,shape,danger,safeClub,score,putts,teeClub,teeResult,approachDist,club,gir,miss,cause,notes,teeStrategy,approachStrategy'];m.a.forEach(x=>{let c=course[x.hole]||{};rows.push([x.hole,x.par,c.cYards,c.cHcp,c.cShape,c.cDangerSide,c.cSafeClub,x.score,x.putts,x.teeClub,x.teeResult,x.approachDist,x.club,x.gir,x.miss,x.cause,x.notes,c.cTee,c.cApproach].map(v=>`"${String(v||'').replaceAll('"','""')}"`).join(','))});let blob=new Blob([rows.join('\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wedge-in-round.csv';a.click()}function copySummary(){navigator.clipboard.writeText(summary());alert('Summary copied')}function resetRound(){if(confirm('Clear current round? Course visuals stay.')){holes={};localStorage.removeItem('wiHoles');loadHole(1);render()}}
loadSetup();loadCourseHole(ch);loadHole(h);render();
</script></body></html>
